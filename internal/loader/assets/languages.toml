# toe curated language runtime for modern Go repositories.
use-grammars = { only = [
  "go",
  "gomod",
  "bash",
  "dockerfile",
  "hcl",
  "gitcommit",
  "gitattributes",
  "gitignore",
  "toml",
  "yaml",
  "json",
  "sql",
  "proto",
  "graphql",
  "html",
  "css",
  "javascript",
  "typescript",
  "tsx",
  "markdown",
  "markdown_inline",
] }

[language-server]
gopls = { command = "gopls" }
bash-language-server = { command = "bash-language-server", args = ["start"] }
docker-langserver = { command = "docker-langserver", args = ["--stdio"] }
terraform-ls = { command = "terraform-ls", args = ["serve"] }
json-language-server = { command = "vscode-json-language-server", args = ["--stdio"] }
yaml-language-server = { command = "yaml-language-server", args = ["--stdio"] }
taplo = { command = "taplo", args = ["lsp", "stdio"] }
buf = { command = "buf", args = ["lsp", "serve", "--timeout", "0"] }
graphql-language-service = { command = "graphql-lsp", args = ["server", "-m", "stream"] }
marksman = { command = "marksman", args = ["server"] }
typescript-language-server = { command = "typescript-language-server", args = ["--stdio"] }

[[language]]
name = "go"
scope = "source.go"
injection-regex = "go"
file-types = ["go"]
roots = ["go.work", "go.mod"]
comment-token = "//"
block-comment-tokens = [{ start = "/*", end = "*/" }]
language-servers = ["gopls"]
auto-format = true
formatter = { command = "gofmt" }
indent = { tab-width = 4, unit = "\t" }

[[language]]
name = "gomod"
scope = "source.gomod"
injection-regex = "gomod|go.mod|go.sum|go.work"
file-types = [
  { glob = "go.mod" },
  { glob = "go.sum" },
  { glob = "go.work" },
  { glob = "go.work.sum" },
]
roots = ["go.work", "go.mod"]
comment-token = "//"
language-servers = ["gopls"]
indent = { tab-width = 4, unit = "\t" }

[[language]]
name = "bash"
scope = "source.bash"
injection-regex = "bash|sh|zsh"
file-types = ["sh", "bash", "zsh", { glob = ".bashrc" }, { glob = ".zshrc" }]
shebangs = ["sh", "bash", "zsh"]
comment-token = "#"
language-servers = ["bash-language-server"]
indent = { tab-width = 2, unit = "  " }

[[language]]
name = "dockerfile"
scope = "source.dockerfile"
injection-regex = "dockerfile|containerfile"
file-types = [
  { glob = "Dockerfile" },
  { glob = "Dockerfile.*" },
  { glob = "Containerfile" },
  { glob = "Containerfile.*" },
]
comment-token = "#"
language-servers = ["docker-langserver"]
indent = { tab-width = 4, unit = "    " }

[[language]]
name = "hcl"
scope = "source.hcl"
injection-regex = "hcl|terraform"
file-types = ["hcl", "tf", "tfvars"]
comment-token = "#"
language-servers = ["terraform-ls"]
indent = { tab-width = 2, unit = "  " }

[[language]]
name = "gitcommit"
scope = "git.commitmsg"
injection-regex = "git-commit"
file-types = [{ glob = "COMMIT_EDITMSG" }, { glob = "MERGE_MSG" }]
comment-token = "#"
text-width = 72

[[language]]
name = "gitignore"
scope = "source.gitignore"
injection-regex = "gitignore"
file-types = [
  { glob = ".gitignore" },
  { glob = ".git/info/exclude" },
  { glob = ".ignore" },
  { glob = "CODEOWNERS" },
  { glob = ".config/toe/ignore" },
  { glob = ".toe/ignore" },
  { glob = ".*ignore" },
  { glob = ".git-blame-ignore-revs" },
]
comment-token = "#"

[[language]]
name = "gitattributes"
scope = "source.gitattributes"
injection-regex = "gitattributes"
file-types = [{ glob = ".gitattributes" }]
comment-token = "#"

[[language]]
name = "env"
scope = "source.env"
injection-regex = "env"
file-types = [{ glob = ".env" }, { glob = ".env.*" }]
comment-token = "#"

[[language]]
name = "toml"
scope = "source.toml"
injection-regex = "toml"
file-types = ["toml"]
comment-token = "#"
language-servers = ["taplo"]
indent = { tab-width = 2, unit = "  " }

[[language]]
name = "yaml"
scope = "source.yaml"
injection-regex = "yaml|yml"
file-types = ["yaml", "yml"]
comment-token = "#"
language-servers = ["yaml-language-server"]
indent = { tab-width = 2, unit = "  " }

[[language]]
name = "json"
scope = "source.json"
injection-regex = "json"
file-types = ["json", "lock"]
language-servers = ["json-language-server"]
indent = { tab-width = 2, unit = "  " }

[[language]]
name = "jsonc"
scope = "source.json"
injection-regex = "jsonc"
file-types = ["jsonc", { glob = "tsconfig.json" }, { glob = "jsconfig.json" }]
grammar = "json"
comment-token = "//"
language-servers = ["json-language-server"]
indent = { tab-width = 2, unit = "  " }

[[language]]
name = "sql"
scope = "source.sql"
injection-regex = "sql"
file-types = ["sql"]
comment-token = "--"
indent = { tab-width = 2, unit = "  " }

[[language]]
name = "protobuf"
scope = "source.proto"
injection-regex = "protobuf|proto"
file-types = ["proto"]
grammar = "proto"
comment-token = "//"
block-comment-tokens = [{ start = "/*", end = "*/" }]
language-servers = ["buf"]
indent = { tab-width = 2, unit = "  " }

[[language]]
name = "graphql"
scope = "source.graphql"
injection-regex = "graphql"
file-types = ["graphql", "gql"]
comment-token = "#"
language-servers = ["graphql-language-service"]
indent = { tab-width = 2, unit = "  " }

[[language]]
name = "html"
scope = "text.html.basic"
injection-regex = "html"
file-types = ["html", "tmpl"]
block-comment-tokens = [{ start = "<!--", end = "-->" }]
indent = { tab-width = 2, unit = "  " }

[[language]]
name = "css"
scope = "source.css"
injection-regex = "css"
file-types = ["css"]
comment-token = "//"
block-comment-tokens = [{ start = "/*", end = "*/" }]
indent = { tab-width = 2, unit = "  " }

[[language]]
name = "javascript"
scope = "source.js"
injection-regex = "js|javascript"
file-types = ["js", "mjs", "cjs"]
comment-token = "//"
block-comment-tokens = [{ start = "/*", end = "*/" }]
language-servers = ["typescript-language-server"]
indent = { tab-width = 2, unit = "  " }

[[language]]
name = "typescript"
scope = "source.ts"
injection-regex = "ts|typescript"
file-types = ["ts", "mts", "cts"]
comment-token = "//"
block-comment-tokens = [{ start = "/*", end = "*/" }]
language-servers = ["typescript-language-server"]
indent = { tab-width = 2, unit = "  " }

[[language]]
name = "tsx"
scope = "source.tsx"
injection-regex = "tsx"
file-types = ["tsx", "jsx"]
comment-token = "//"
block-comment-tokens = [{ start = "/*", end = "*/" }]
language-servers = ["typescript-language-server"]
indent = { tab-width = 2, unit = "  " }

[[language]]
name = "markdown"
scope = "source.md"
injection-regex = "md|markdown"
file-types = ["md", "markdown"]
comment-token = "<!--"
language-servers = ["marksman"]
soft-wrap = { enable = true }

[[language]]
name = "markdown.inline"
scope = "source.markdown.inline"
injection-regex = "markdown\\.inline"
grammar = "markdown_inline"

